<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in to Aura-Assist</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/favicon/apple-icon.png">
  <link rel="manifest" href="/favicon/manifest.json">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
    <p class="text-gray-500 mt-2">Enter your email to receive a secure login link.</p>
  </div>

  <form id="loginForm" class="space-y-6">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
      <input type="email" id="email" required
             class="mt-1 block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-emerald-500 focus:border-emerald-500"
             placeholder="jane@example.com">
    </div>

    <button type="submit" id="submitBtn"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
      Send Magic Link
    </button>
  </form>

  <div id="successState" class="hidden text-center space-y-4">
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
      <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <h3 class="text-lg font-medium text-gray-900">Check your email</h3>
    <p class="text-sm text-gray-500">If an account exists for that email, we have sent a secure login link.</p>
  </div>

  <div class="mt-6 text-center">
    <p class="text-sm text-gray-600">
      Don't have an account?
      <a href="/register.html" class="font-medium text-emerald-600 hover:text-emerald-500">Sign up</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const form = e.target;
    const submitBtn = document.getElementById('submitBtn');
    const successState = document.getElementById('successState');
    const email = document.getElementById('email').value.trim().toLowerCase();

    // UI Loading State
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

    try {
      const response = await fetch('/.netlify/functions/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      // Regardless of actual DB success/fail, show the success UI
      // to prevent email enumeration attacks.
      form.classList.add('hidden');
      successState.classList.remove('hidden');

    } catch (error) {
      console.error('Login error:', error);
      alert('A network error occurred. Please try again.');

      // Reset UI
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Magic Link';
      submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
    }
  });
</script>
</body>
</html>
