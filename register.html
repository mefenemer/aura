<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Aura-Assist</title>
  <link href="./style.css" rel="stylesheet">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="/favicon/apple-icon.png">
  <link rel="manifest" href="/favicon/manifest.json">
</head>
<body class="font-sans text-gray-800 antialiased bg-gray-50 flex flex-col min-h-screen">

<!-- Top Navigation Placeholder -->
<div id="nav-placeholder"></div>

<main class="flex-grow flex items-center justify-center px-4 py-12 w-full">
  <div class="bg-white p-8 md:p-10 rounded-3xl shadow-xl border border-gray-100 w-full max-w-lg relative overflow-hidden">

    <!-- Decorative Accent -->
    <div class="absolute top-0 left-0 w-full h-2 bg-emerald-700"></div>

    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Create Your Account</h1>
      <p class="text-gray-500 font-medium">Let's get your digital workspace provisioned.</p>
    </div>

    <form id="registrationForm" onsubmit="handleRegistration(event)" class="space-y-5">

      <!-- Name Fields -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <label for="firstName" class="block text-sm font-bold text-gray-700 mb-1">First Name <span class="text-emerald-700">*</span></label>
          <input type="text" id="firstName" required
                 class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 outline-none transition-all shadow-sm"
                 placeholder="Jane">
        </div>
        <div>
          <label for="lastName" class="block text-sm font-bold text-gray-700 mb-1">Last Name <span class="text-emerald-700">*</span></label>
          <input type="text" id="lastName" required
                 class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 outline-none transition-all shadow-sm"
                 placeholder="Doe">
        </div>
      </div>

      <!-- Email Field -->
      <div>
        <label for="email" class="block text-sm font-bold text-gray-700 mb-1">Work Email <span class="text-emerald-700">*</span></label>
        <input type="email" id="email" required
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 outline-none transition-all shadow-sm"
               placeholder="jane@yourcompany.com">
      </div>

      <!-- Business Name (Optional) -->
      <div>
        <label for="businessName" class="block text-sm font-bold text-gray-700 mb-1">Business Name <span class="text-gray-400 font-normal">(Optional)</span></label>
        <input type="text" id="businessName"
               class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 outline-none transition-all shadow-sm"
               placeholder="Acme Corp">
      </div>

      <!-- Error Message Container -->
      <div id="errorMessage" class="hidden bg-red-50 text-red-700 text-sm font-semibold p-3 rounded-lg border border-red-100 mt-4">
        <!-- Error text injected here -->
      </div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn"
              class="w-full block text-center px-6 py-4 mt-6 text-lg font-bold rounded-xl text-white bg-green-600 hover:bg-green-700 shadow-lg hover:shadow-xl transition-all cursor-pointer">
        Verify Email & Continue
      </button>

    </form>

    <p class="text-center text-sm text-gray-500 mt-8">
      Already have an account? <a href="#" class="text-emerald-700 font-bold hover:underline">Sign in</a>
    </p>
  </div>
</main>

<!-- Footer Placeholder -->
<div id="footer-placeholder"></div>

<script>
  // Load layout components to match the rest of the site
  async function loadComponent(placeholderId, filePath) {
    try {
      const response = await fetch(filePath);
      if (response.ok) {
        document.getElementById(placeholderId).innerHTML = await response.text();
      }
    } catch (error) {
      console.error(`Error loading component ${filePath}:`, error);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadComponent("nav-placeholder", "./components/nav.html");
    loadComponent("footer-placeholder", "./components/footer.html");
  });

  async function handleRegistration(event) {
    event.preventDefault(); // Stop default form submission

    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');

    // Extract values
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const email = document.getElementById('email').value.trim();
    const businessName = document.getElementById('businessName').value.trim();

    // Reset UI states
    errorMessage.classList.add('hidden');
    submitBtn.disabled = true;
    submitBtn.innerText = "Sending Link...";
    submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

    try {
      sessionStorage.setItem('aura_pending_email', email);
      const response = await fetch('/.netlify/functions/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        // Include businessName directly in the API payload
        body: JSON.stringify({ firstName, lastName, email, businessName })
      });

      const data = await response.json();

      if (response.ok) {
        window.location.href = '/check-email.html';
      } else {
        errorMessage.innerText = data.error || "An error occurred during registration.";
        errorMessage.classList.remove('hidden');
        resetButton();
      }
    } catch (error) {
      console.error("Network Error:", error);
      errorMessage.innerText = "Unable to connect to the server. Please try again.";
      errorMessage.classList.remove('hidden');
      resetButton();
    }

    function resetButton() {
      submitBtn.disabled = false;
      submitBtn.innerText = "Verify Email & Continue";
      submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
    }
  }
</script>
</body>
</html>
