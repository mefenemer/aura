<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | Aura-Assist</title>
  <link href="./style.css" rel="stylesheet">
  <link rel="icon" href="/favicon/favicon.ico" sizes="any">
  <meta http-equiv="refresh" content="60">
</head>
<body class="font-sans text-gray-800 antialiased bg-gray-50 flex flex-col min-h-screen items-center justify-center">
  <div class="text-center max-w-lg px-6">
    <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <h1 class="text-3xl font-extrabold text-gray-900 mb-3">We'll be back shortly</h1>
    <p id="maintenance-message" class="text-gray-500 text-lg mb-6">
      We are performing scheduled maintenance. Please check back shortly.
    </p>
    <p class="text-sm text-gray-400">This page refreshes automatically every 60 seconds.</p>
    <a href="/" class="mt-8 inline-block text-emerald-700 hover:underline text-sm font-semibold">Try again</a>
  </div>

  <script>
    // Read the message from the query param (set by the edge function)
    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg');
    if (msg) {
      document.getElementById('maintenance-message').textContent = msg;
    }
  </script>
</body>
</html>
