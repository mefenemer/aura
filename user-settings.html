<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full pb-20 relative">

    <div class="mb-10">
        <h1 class="text-3xl font-extrabold text-gray-900">Account Settings</h1>
        <p class="text-gray-500 mt-1">Changes save automatically in the background as you update your workspace.</p>
    </div>

    <div id="notification-error-banner" class="hidden mb-6 p-4 bg-red-50 text-red-700 text-sm font-semibold rounded-xl border border-red-100 flex items-center gap-3">
        <span>Failed to auto-save change. Please verify your connection.</span>
    </div>

    <div class="space-y-8">
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900">Profile Information</h3>
            </div>
            <div class="p-6 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                        <input type="text" id="input-first-name" data-field="firstName" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                        <input type="text" id="input-last-name" data-field="lastName" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" id="input-email" data-field="email" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Timezone</label>
                    <select id="input-timezone" data-field="timezone" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none bg-white cursor-pointer">
                        <option value="Europe/Athens">Eastern European Time (Athens/Syros)</option>
                        <option value="Europe/London">Greenwich Mean Time (London)</option>
                        <option value="Europe/Paris">Central European Time (Paris)</option>
                        <option value="America/New_York">Eastern Time (US & Canada)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Notification Preferences Section -->
        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-gray-100 bg-gray-50/50">
                <h3 class="text-lg font-bold text-gray-900">Notification Preferences</h3>
            </div>
            <div class="p-6 space-y-4">

                <!-- Toggle 1: Wins -->
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-semibold text-gray-900">Assistant Wins & Summaries</p>
                    </div>
                    <button type="button" id="toggle-notify-wins" data-pref-key="notifyWins" class="bg-red-500 relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none" role="switch" aria-checked="false">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
                    </button>
                </div>

                <div class="border-t border-gray-100 my-4"></div>

                <!-- Toggle 2: Billing -->
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-semibold text-gray-900">Billing & Subscription</p>
                    </div>
                    <button type="button" id="toggle-notify-billing" data-pref-key="notifyBilling" class="bg-red-500 relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none" role="switch" aria-checked="false">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
                    </button>
                </div>

                <div class="border-t border-gray-100 my-4"></div>

                <!-- Toggle 3: Availability -->
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-semibold text-gray-900">New Role Availability</p>
                    </div>
                    <button type="button" id="toggle-notify-availability" data-pref-key="notifyAvailability" class="bg-red-500 relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none" role="switch" aria-checked="false">
                        <span aria-hidden="true" class="translate-x-0 pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out"></span>
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
