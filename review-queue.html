<div class="p-6">

  <!-- Page header -->
  <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
    <div>
      <h1 class="text-2xl font-extrabold text-gray-900">Review Queue</h1>
      <p class="text-sm text-gray-500 mt-1">Follow each post from review through to posted — and review or amend anything before it goes live.</p>
    </div>
    <button onclick="openGeneratePostSheet()" class="px-4 py-2 text-sm font-bold bg-emerald-700 hover:bg-emerald-800 text-white rounded-lg transition cursor-pointer flex items-center gap-1.5">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Create Post
    </button>
  </div>

  <!-- Card with lifecycle columns + grouped content -->
  <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">

    <!-- Lifecycle columns -->
    <div class="flex gap-1 px-4 pt-3 border-b border-gray-100 overflow-x-auto">
      <button class="rq-col px-4 py-2 text-sm font-semibold rounded-t border-b-2 border-emerald-600 text-emerald-700 whitespace-nowrap"
        data-status="review" onclick="rqOpenStatus('review', this)">
        Review
        <span id="rq-col-count-review" class="ml-1 bg-amber-100 text-amber-700 text-xs px-1.5 py-0.5 rounded-full hidden"></span>
      </button>
      <button class="rq-col px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 rounded-t whitespace-nowrap"
        data-status="approved" onclick="rqOpenStatus('approved', this)">Approved</button>
      <button class="rq-col px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 rounded-t whitespace-nowrap"
        data-status="scheduled" onclick="rqOpenStatus('scheduled', this)">Scheduled</button>
      <button class="rq-col px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 rounded-t whitespace-nowrap"
        data-status="posted" onclick="rqOpenStatus('posted', this)">Posted</button>
      <button class="rq-col px-4 py-2 text-sm font-medium text-gray-500 hover:text-gray-700 rounded-t whitespace-nowrap"
        data-status="archived" onclick="rqOpenStatus('archived', this)">Archived</button>
    </div>

    <!-- Grouped, collapsible content -->
    <div id="rq-groups" class="px-4 py-2 min-h-[200px]"></div>

  </div>
</div>

<script>
(function initReviewQueuePage() {
  if (typeof rqOpenStatus === 'function') rqOpenStatus('review', document.querySelector('.rq-col[data-status="review"]'));
})();
</script>
