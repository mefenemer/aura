<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./auth-check.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace | Aura-Assist</title>
  <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

<div class="fixed inset-y-0 left-0 z-30 w-64 hidden md:block">
  <div id="sidebar-placeholder" class="h-full"></div>
</div>

<div class="md:ml-64 flex flex-col min-h-screen">

  <header class="sticky top-0 z-20 h-16 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-4 sm:px-6 lg:px-8">
    <button class="md:hidden text-gray-500 hover:text-gray-900 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>

    <h2 id="header-title" class="text-lg font-bold text-gray-900 hidden md:block">Workspace Overview</h2>

    <div class="flex items-center gap-4 relative">
      <button class="text-gray-400 hover:text-emerald-600 transition-colors relative">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
      </button>

      <button class="flex items-center focus:outline-none">
        <div class="h-9 w-9 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold border border-emerald-200">
          <span id="user-initial">M</span>
        </div>
      </button>
    </div>
  </header>

  <main class="flex-1 w-full">
    <div id="workspace-content">
    </div>
  </main>

</div>

<script>
  async function loadComponent(placeholderId, filePath) {
    try {
      const response = await fetch(filePath);
      if (response.ok) {
        document.getElementById(placeholderId).innerHTML = await response.text();
      }
    } catch (error) {
      console.error(`Error loading component ${filePath}:`, error);
    }
  }

  document.addEventListener("DOMContentLoaded", async () => {
    await loadComponent("sidebar-placeholder", "./components/sidebar.html");

    const contentContainer = document.getElementById("workspace-content");
    const headerTitle = document.getElementById("header-title");

    const routes = {
      'dashboard': { file: 'dashboard-content.html', title: 'Workspace Overview' },
      'catalog': { file: 'assistant-catalogue.html', title: 'Hire Assistant' },
      'settings': { file: 'user-settings.html', title: 'Account Settings' },
      'billing': { file: 'billing.html', title: 'Subscription & Billing' }
    };

    const navLinks = {
      'dashboard': document.getElementById('nav-dashboard'),
      'catalog': document.getElementById('nav-catalog'),
      'settings': document.getElementById('nav-settings'),
      'billing': document.getElementById('nav-billing')
    };

    async function loadView(routeKey) {
      const route = routes[routeKey];
      if (!route) return;

      try {
        const response = await fetch(`./${route.file}`);

        if (!response.ok) {
          console.error(`Failed to load view: ${response.statusText}`);
          contentContainer.innerHTML = `<div class="p-8 text-center text-red-600">Failed to load content. Please try again.</div>`;
          return;
        }

        contentContainer.innerHTML = await response.text();
        window.scrollTo(0, 0); // Reset native scroll to top on page change

        if (headerTitle) {
          headerTitle.textContent = route.title;
        }

        updateActiveNav(routeKey);

        const internalCatalogLink = document.getElementById('route-to-catalog');
        if (internalCatalogLink) {
          internalCatalogLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await loadView('catalog');
          });
        }

      } catch (error) {
        console.error("Network or execution error:", error);
        contentContainer.innerHTML = `<div class="p-8 text-center text-red-600">Failed to load content. Please try again.</div>`;
      }
    }

    function updateActiveNav(activeKey) {
      Object.values(navLinks).forEach(link => {
        if(!link) return;
        link.className = "flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-100 hover:text-gray-900 rounded-lg font-medium transition-colors";
      });

      const activeLink = navLinks[activeKey];
      if (activeLink) {
        activeLink.className = "flex items-center gap-3 px-3 py-2.5 bg-emerald-50 text-emerald-700 rounded-lg font-semibold transition-colors";
      }
    }

    Object.keys(navLinks).forEach(key => {
      const link = navLinks[key];
      if (link) {
        link.addEventListener('click', async (e) => {
          e.preventDefault();
          await loadView(key);
        });
      }
    });

    await loadView('dashboard');
  });
</script>
</body>
</html>
