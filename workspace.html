<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./auth-check.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace | Aura-Assist</title>
  <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">

<div id="mobile-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-30 hidden transition-opacity duration-300 cursor-pointer"></div>

<div id="sidebar-container" class="fixed inset-y-0 left-0 z-40 w-64 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out bg-white shadow-2xl md:shadow-none">
  <div id="sidebar-placeholder" class="h-full"></div>
</div>

<div class="md:ml-64 flex flex-col min-h-screen">

  <header class="sticky top-0 z-20 h-16 bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-4 sm:px-6 lg:px-8">

    <button id="mobile-menu-btn" class="md:hidden text-gray-500 hover:text-gray-900 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>

    <h2 id="header-title" class="text-lg font-bold text-gray-900 hidden md:block">Workspace Overview</h2>

    <div class="flex items-center gap-4 relative ml-auto md:ml-0">
      <button class="text-gray-400 hover:text-emerald-600 transition-colors relative">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        <span class="absolute top-0 right-0 block h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
      </button>

      <button class="flex items-center focus:outline-none">
        <div class="h-9 w-9 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold border border-emerald-200">
          <span id="user-initial">M</span>
        </div>
      </button>
    </div>
  </header>

  <main class="flex-1 w-full bg-gray-50">
    <div id="workspace-content"></div>
  </main>

</div>

<script>
  async function loadSidebar(placeholderId) {
    // Smart fetch: Tries the components folder first, falls back to the root folder
    const paths = ["./components/sidebar.html", "./sidebar.html"];
    for (let path of paths) {
      try {
        const response = await fetch(path);
        if (response.ok) {
          const container = document.getElementById(placeholderId);
          container.innerHTML = await response.text();

          // Cleanup: Strip the hardcoded 'hidden' class off the injected sidebar
          // so it remains visible when we slide the mobile menu open
          const aside = container.querySelector('aside');
          if (aside) {
            aside.classList.remove('hidden', 'md:flex');
            aside.classList.add('flex', 'w-full');
          }
          return;
        }
      } catch (e) { }
    }
    console.error("Error: Could not locate sidebar.html");
  }

  document.addEventListener("DOMContentLoaded", async () => {
    // 1. Load the sidebar dynamically
    await loadSidebar("sidebar-placeholder");

    const contentContainer = document.getElementById("workspace-content");
    const headerTitle = document.getElementById("header-title");

    // Mobile Menu State Management
    const sidebarContainer = document.getElementById('sidebar-container');
    const mobileOverlay = document.getElementById('mobile-overlay');
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');

    function closeMobileMenu() {
      if (window.innerWidth < 768) {
        sidebarContainer.classList.add('-translate-x-full');
        mobileOverlay.classList.add('hidden');
      }
    }

    if(mobileMenuBtn) {
      mobileMenuBtn.addEventListener('click', () => {
        sidebarContainer.classList.remove('-translate-x-full');
        mobileOverlay.classList.remove('hidden');
      });
    }

    if(mobileOverlay) {
      mobileOverlay.addEventListener('click', closeMobileMenu);
    }

    const routes = {
      'dashboard': { file: 'dashboard-content.html', title: 'Workspace Overview' },
      'catalog': { file: 'assistant-catalogue.html', title: 'Hire Assistant' },
      'settings': { file: 'user-settings.html', title: 'Account Settings' },
      'billing': { file: 'billing.html', title: 'Subscription & Billing' }
    };

    const navLinks = {
      'dashboard': document.getElementById('nav-dashboard'),
      'catalog': document.getElementById('nav-catalog'),
      'settings': document.getElementById('nav-settings'),
      'billing': document.getElementById('nav-billing')
    };

    async function loadView(routeKey) {
      const route = routes[routeKey];
      if (!route) return;

      try {
        const response = await fetch(`./${route.file}`);

        if (!response.ok) {
          console.error(`Failed to load view: ${response.statusText}`);
          contentContainer.innerHTML = `<div class="p-8 text-center text-red-600">Failed to load content. Please try again.</div>`;
          return;
        }

        contentContainer.innerHTML = await response.text();
        window.scrollTo(0, 0); // Automatically reset scroll to the top of the page
        closeMobileMenu();     // Automatically close the sidebar on mobile after clicking

        if (headerTitle) {
          headerTitle.textContent = route.title;
        }

        updateActiveNav(routeKey);

        const internalCatalogLink = document.getElementById('route-to-catalog');
        if (internalCatalogLink) {
          internalCatalogLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await loadView('catalog');
          });
        }

      } catch (error) {
        console.error("Network error:", error);
        contentContainer.innerHTML = `<div class="p-8 text-center text-red-600">Failed to load content. Please try again.</div>`;
      }
    }

    function updateActiveNav(activeKey) {
      Object.values(navLinks).forEach(link => {
        if(!link) return;
        link.className = "flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-100 hover:text-gray-900 rounded-lg font-medium transition-colors";
      });

      const activeLink = navLinks[activeKey];
      if (activeLink) {
        activeLink.className = "flex items-center gap-3 px-3 py-2.5 bg-emerald-50 text-emerald-700 rounded-lg font-semibold transition-colors";
      }
    }

    Object.keys(navLinks).forEach(key => {
      const link = navLinks[key];
      if (link) {
        link.addEventListener('click', async (e) => {
          e.preventDefault();
          await loadView(key);
        });
      }
    });

    await loadView('dashboard');
  });
</script>
</body>
</html>
