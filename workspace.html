<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./auth-check.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace | Aura-Assist</title>
  <link href="./style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen">

<nav class="fixed top-0 left-0 right-0 z-50 h-16 w-full bg-white border-b border-gray-200 shadow-sm flex items-center justify-between px-4 sm:px-6 lg:px-8">

  <div class="flex items-center gap-3 sm:gap-4">
    <button id="mobile-menu-btn" class="md:hidden text-gray-500 hover:text-gray-900 focus:outline-none">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <a href="#" class="flex items-center">
      <span class="font-extrabold text-xl sm:text-2xl text-emerald-700 tracking-tight">Aura-Assist</span>
    </a>
    <span id="header-title" class="text-sm sm:text-base font-medium text-gray-400 ml-1 sm:ml-2">| My Workspace</span>
  </div>

  <div class="flex items-center gap-3">
    <div class="hidden sm:block text-right">
      <p id="header-user-name" class="text-sm font-bold text-gray-900 truncate max-w-[160px]"></p>
      <p id="header-user-email" class="text-xs text-gray-500 truncate max-w-[160px]"></p>
    </div>
    <div id="header-user-initials" class="w-9 h-9 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold shrink-0 text-sm">
    </div>
  </div>

</nav>

<div id="mobile-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-30 hidden transition-opacity duration-300 cursor-pointer"></div>

<div id="sidebar-container" style="top: 64px;" class="fixed bottom-0 left-0 z-40 w-64 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out bg-white border-r border-gray-200 overflow-y-auto">
  <div id="sidebar-placeholder" class="h-full"></div>
</div>

<div class="md:ml-64 flex flex-col min-h-screen bg-gray-50">
  <div class="h-16 w-full shrink-0"></div>

  <main id="workspace-content" class="flex-1 w-full"></main>
</div>

<script>
  async function loadSidebar(placeholderId) {
    const paths = ["./components/sidebar.html", "./sidebar.html"];
    for (let path of paths) {
      try {
        const response = await fetch(path);
        if (response.ok) {
          const container = document.getElementById(placeholderId);
          container.innerHTML = await response.text();

          const aside = container.querySelector('aside');
          if (aside) {
            aside.classList.remove('hidden', 'md:flex');
            aside.classList.add('flex', 'w-full');
          }
          return;
        }
      } catch (e) { }
    }
    console.error("Error: Could not locate sidebar.html");
  }

  document.addEventListener("DOMContentLoaded", async () => {
    // 1. Force the sidebar to inject before drawing main components
    await loadSidebar("sidebar-placeholder");
// --- DYNAMIC HEADER HYDRATION ---
    async function loadHeaderProfile() {
      const nameEl = document.getElementById('header-user-name');
      const emailEl = document.getElementById('header-user-email');
      const initialsEl = document.getElementById('header-user-initials');

      try {
        const response = await fetch('/.netlify/functions/update-profile');
        if (response.ok) {
          const profileData = await response.json();

          const fName = profileData.firstName || '';
          const lName = profileData.lastName || '';
          const fullName = `${fName} ${lName}`.trim();

          // Populate text fields
          if (nameEl) nameEl.textContent = fullName || 'Aura User';
          if (emailEl) emailEl.textContent = profileData.email || '';

          // Generate initials dynamically for the avatar circle
          if (initialsEl && fName) {
            const initial1 = fName.charAt(0).toUpperCase();
            const initial2 = lName ? lName.charAt(0).toUpperCase() : '';
            initialsEl.textContent = `${initial1}${initial2}`;
          } else if (initialsEl) {
            initialsEl.textContent = 'U'; // Fallback
          }
        }
      } catch (error) {
        console.error("Failed to load user header profile from DB:", error);
      }
    }

    // Fire the fetch request instantly on page load
    loadHeaderProfile();
    const contentContainer = document.getElementById("workspace-content");
    const headerTitle = document.getElementById("header-title");

    // Mobile Layout Toggle State Controllers
    const sidebarContainer = document.getElementById('sidebar-container');
    const mobileOverlay = document.getElementById('mobile-overlay');
    const mobileMenuBtn = document.getElementById('mobile-menu-btn');

    function closeMobileMenu() {
      if (window.innerWidth < 768) {
        sidebarContainer.classList.add('-translate-x-full');
        mobileOverlay.classList.add('hidden');
      }
    }

    if(mobileMenuBtn) {
      mobileMenuBtn.addEventListener('click', () => {
        sidebarContainer.classList.remove('-translate-x-full');
        mobileOverlay.classList.remove('hidden');
      });
    }

    if(mobileOverlay) {
      mobileOverlay.addEventListener('click', closeMobileMenu);
    }

    // Consolidated path definitions mapping navigation links to standard modular components
    const routes = {
      'dashboard': { file: 'dashboard-content.html', title: '| Workspace Overview' },
      'catalog': { file: 'assistant-catalogue.html', title: '| Hire Assistant' },
      'notifications': { file: 'notifications.html', title: '| Notifications Feed' },
      'settings': { file: 'user-settings.html', title: '| Account Settings' },
      'billing': { file: 'billing.html', title: '| Subscription & Billing' },
      'help': { file: 'help-content.html', title: '| Help & Support' }
    };

    // Consolidated DOM element hooks
    const navLinks = {
      'dashboard': document.getElementById('nav-dashboard'),
      'catalog': document.getElementById('nav-catalog'),
      'notifications': document.getElementById('nav-notifications'),
      'settings': document.getElementById('nav-settings'),
      'billing': document.getElementById('nav-billing'),
      'help': document.getElementById('nav-help')
    };

    async function loadView(routeKey) {
      const route = routes[routeKey];
      if (!route) return;

      try {
        const response = await fetch(`./${route.file}`);
        if (!response.ok) throw new Error('Network component not found');

        contentContainer.innerHTML = await response.text();

        // Native window view scroll reposition cleaner
        window.scrollTo(0, 0);
        closeMobileMenu();

        if (headerTitle) {
          headerTitle.textContent = route.title;
        }

        updateActiveNav(routeKey);

        // Map internal action anchors (e.g. Dashboard "Delegate a New Task" button)
        const internalCatalogLink = document.getElementById('route-to-catalog');
        if (internalCatalogLink) {
          internalCatalogLink.addEventListener('click', async (e) => {
            e.preventDefault();
            await loadView('catalog');
          });
        }

        // Initialize engine lifecycles depending on route targets
        if (routeKey === 'settings') {
          // This single function now handles BOTH profile fields and notification toggles
          await initProfileSettingsCenter();
        }

        if (routeKey === 'help') {
          await initHelpCenter();
        }

      } catch (error) {
        console.error("Routing execution error:", error);
        contentContainer.innerHTML = `<div class="p-8 text-center text-red-600 font-medium">Failed to load requested view. Please try again.</div>`;
      }
    }

    function updateActiveNav(activeKey) {
      Object.values(navLinks).forEach(link => {
        if (!link) return;
        link.classList.remove('bg-emerald-50', 'text-emerald-700', 'font-semibold');
        link.classList.add('text-gray-600', 'hover:bg-gray-100', 'hover:text-gray-900', 'font-medium');
      });

      const activeLink = navLinks[activeKey];
      if (activeLink) {
        activeLink.classList.remove('text-gray-600', 'hover:bg-gray-100', 'hover:text-gray-900', 'font-medium');
        activeLink.classList.add('bg-emerald-50', 'text-emerald-700', 'font-semibold');
      }
    }

    Object.keys(navLinks).forEach(key => {
      const link = navLinks[key];
      if (link) {
        link.addEventListener('click', async (e) => {
          e.preventDefault();
          await loadView(key);
        });
      }
    });

    // Fire the initial landing layout
    await loadView('dashboard');
  });

  // ==========================================================================
  // DYNAMIC HELP CENTER DATA ENGINE
  // ==========================================================================
  async function initHelpCenter() {
    const grid = document.getElementById('help-grid');
    const searchInput = document.getElementById('help-search-input');
    const filterButtons = document.querySelectorAll('.filter-btn');
    let allArticles = [];

    if (!grid) return;

    try {
      const res = await fetch('/.netlify/functions/get-help-articles');
      if (res.ok) {
        allArticles = await res.json();
        renderArticles(allArticles);
      } else {
        grid.innerHTML = `<div class="col-span-full p-8 text-center text-red-500 font-semibold bg-red-50 rounded-xl border border-red-100">Failed to load articles from remote server.</div>`;
      }
    } catch (e) {
      console.error("Database connection failure:", e);
      grid.innerHTML = `<div class="col-span-full p-8 text-center text-red-500 font-semibold bg-red-50 rounded-xl border border-red-100">Network connection exception. Could not connect to database function.</div>`;
    }

    function renderArticles(articles) {
      if (articles.length === 0) {
        grid.innerHTML = `<div class="col-span-full py-12 text-center text-gray-500 font-medium bg-white rounded-2xl border border-gray-100 shadow-sm">No documentation records match your criteria.</div>`;
        return;
      }

      const iconMap = {
        'layout': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>`,
        'book': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>`,
        'bot': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`,
        'shield': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>`,
        'credit-card': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>`,
        'user': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>`,
        'bell': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>`,
        'compass': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242zM21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`,
        'edit': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`,
        'default': `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
      };

      grid.innerHTML = articles.map(article => `
              <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 hover:shadow-md transition flex flex-col h-full">
                  <div class="flex justify-between items-start mb-4">
                      <div class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center">
                          ${iconMap[article.icon] || iconMap['default']}
                      </div>
                      <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">${article.category}</span>
                  </div>
                  <h3 class="text-lg font-bold text-gray-900 mb-2">${article.title}</h3>
                  <p class="text-sm text-gray-500 mb-6 flex-grow leading-relaxed">${article.description}</p>
                  <div class="flex justify-between items-center mt-auto pt-4 border-t border-gray-50">
                      <span class="text-xs font-medium text-gray-400">${article.readTime}</span>
                      <span class="text-emerald-700 font-semibold text-sm hover:underline">Read Article &rarr;</span>
                  </div>
              </div>
          `).join('');
    }

    let currentCategory = 'All';
    let currentSearch = '';

    function filterData() {
      const filtered = allArticles.filter(a => {
        const matchesCategory = currentCategory === 'All' || a.category === currentCategory;
        const matchesSearch = a.title.toLowerCase().includes(currentSearch) || a.description.toLowerCase().includes(currentSearch);
        return matchesCategory && matchesSearch;
      });
      renderArticles(filtered);
    }

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        if (e.target && 'value' in e.target) {
          currentSearch = String(e.target.value).toLowerCase();
          filterData();
        }
      });
    }

    if (filterButtons) {
      filterButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          filterButtons.forEach(b => {
            b.className = "px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 transition filter-btn";
          });

          const currentButton = e.currentTarget;
          if (currentButton && 'classList' in currentButton) {
            currentButton.className = "px-4 py-2 rounded-full text-sm font-bold bg-emerald-50 text-emerald-700 border border-emerald-100 transition filter-btn";
            currentCategory = currentButton.getAttribute('data-category') || 'All';
            filterData();
          }
        });
      });
    }
  }

  // ==========================================================================
  // MODERN BACKGROUND CONFIGURATION DISPATCH HUB (AUTO-SAVE & OPTIMISTIC UI)
  // ==========================================================================
  async function initProfileSettingsCenter() {
    const errorBanner = document.getElementById('notification-error-banner');
    const errorText = errorBanner ? errorBanner.querySelector('span') : null;

    const fields = [
      document.getElementById('input-first-name'),
      document.getElementById('input-last-name'),
      document.getElementById('input-email'),
      document.getElementById('input-timezone')
    ];

    const toggles = [
      document.getElementById('toggle-notify-wins'),
      document.getElementById('toggle-notify-billing'),
      document.getElementById('toggle-notify-availability')
    ];

    function triggerError(msg) {
      if (errorBanner && errorText) {
        errorText.textContent = msg;
        errorBanner.classList.remove('hidden');
      }
      console.error(msg);
    }

    // --- STEP 1: HYDRATE DATA ---
    try {
      const pRes = await fetch('/.netlify/functions/update-profile');
      if (pRes.ok) {
        const pData = await pRes.json();
        fields.forEach(f => {
          if (!f) return;
          const key = f.getAttribute('data-field');
          if (key && key in pData) f.value = pData[key] || '';
        });
      }

      const nRes = await fetch('/.netlify/functions/update-notifications');
      if (nRes.ok) {
        const nData = await nRes.json();
        toggles.forEach(t => {
          if (!t) return;
          const key = t.getAttribute('data-pref-key') || t.getAttribute('data-preference-key');
          // NATIVE CHECKBOX HYDRATION
          if (key && key in nData) t.checked = nData[key];
        });
      }
    } catch (e) {
      console.warn("Hydration incomplete. Defaults loaded.");
    }


    // --- STEP 2: PROFILE AUTO-SAVE INTERACTION RULES ---
    fields.forEach(field => {
      if (!field) return;

      const saveEvent = field.tagName === 'SELECT' ? 'change' : 'blur';
      field.addEventListener(saveEvent, async () => {
        if (errorBanner) errorBanner.classList.add('hidden');
        const fieldKey = field.getAttribute('data-field');
        const value = String(field.value).trim();

        field.classList.add('border-emerald-500', 'ring-2', 'ring-emerald-100');

        try {
          const res = await fetch('/.netlify/functions/update-profile', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({fieldKey, value})
          });

          if (!res.ok) {
            const errorData = await res.json().catch(() => ({}));
            triggerError(`Failed to save ${fieldKey}: ${errorData.error || 'Server rejected query.'}`);
          }
        } catch (err) {
          triggerError(`Network disconnected while saving ${fieldKey}.`);
        } finally {
          setTimeout(() => field.classList.remove('border-emerald-500', 'ring-2', 'ring-emerald-100'), 600);
        }
      });
    });

    // --- STEP 3: NOTIFICATION TOGGLES TRACKING WITH REPAIR FALLBACK ---
    // --- STEP 3: NOTIFICATION TOGGLES TRACKING WITH REPAIR FALLBACK ---
    toggles.forEach(toggle => {
      if (!toggle) return;

      // Revert to listening for button clicks
      toggle.addEventListener('click', async (e) => {
        e.preventDefault();
        if (errorBanner) errorBanner.classList.add('hidden');

        // Check if aria-checked is true
        const isCurrentlyChecked = toggle.getAttribute('aria-checked') === 'true';
        const targetNextState = !isCurrentlyChecked;
        const preferenceKey = toggle.getAttribute('data-pref-key') || toggle.getAttribute('data-preference-key');

        // Optimistic UI Update (Slide instantly to make app feel fast)
        updateToggleView(toggle, targetNextState);

        try {
          const res = await fetch('/.netlify/functions/update-notifications', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ preferenceKey, value: targetNextState })
          });

          if (!res.ok) {
            updateToggleView(toggle, isCurrentlyChecked); // Snap back on failure
            const errorData = await res.json().catch(() => ({}));
            triggerError(`Toggle failed: ${errorData.error || 'Server rejected query.'}`);
          }
        } catch (err) {
          updateToggleView(toggle, isCurrentlyChecked); // Snap back on failure
          triggerError(`Network disconnected while toggling preference.`);
        }
      });
    });

    // Helper function to animate the toggle switches smoothly to match the provided image
    function updateToggleView(el, status) {
      el.setAttribute('aria-checked', status ? 'true' : 'false');
      const dot = el.querySelector('span');

      if (status) {
        // Active State: Green background, dot slid to the right
        el.classList.remove('bg-red-500');
        el.classList.add('bg-green-500'); // Matches bright green in image
        if (dot) {
          dot.classList.remove('translate-x-0');
          dot.classList.add('translate-x-5');
        }
      } else {
        // Inactive State: Red background, dot sitting on the left
        el.classList.remove('bg-green-500');
        el.classList.add('bg-red-500'); // Matches bold red in image
        if (dot) {
          dot.classList.remove('translate-x-5');
          dot.classList.add('translate-x-0');
        }
      }
    }
  }
</script>
</body>
</html>
