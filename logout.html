<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | Be More Swan</title>
    <!--    <script src="https://cdn.tailwindcss.com"></script>-->
    <link href="./style.css" rel="stylesheet">
    <link rel="icon" href="/favicon/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/favicon/apple-icon.png">
    <link rel="manifest" href="/favicon/manifest.json">
</head>
<body class="font-sans text-gray-800 antialiased bg-gray-50 flex flex-col min-h-screen">
<div id="nav-placeholder"></div>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-20">
        <div class="bg-white p-10 rounded-2xl border border-gray-200 shadow-sm max-w-md w-full text-center">
            
            <!-- Icon -->
            <div class="mx-auto w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            
            <!-- Message -->
            <h1 class="text-2xl font-extrabold text-gray-900 mb-3">You're securely logged out.</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">
                Enjoy the rest of your day! Don't worry—your digital team is still running perfectly in the background while you are away.
            </p>
            
            <!-- Actions -->
            <div class="space-y-3">
                <a href="login.html" class="block w-full bg-emerald-700 hover:bg-emerald-800 text-white font-bold py-3 rounded-lg shadow-sm transition">
                    Log Back In
                </a>
                <a href="index.html" class="block w-full bg-gray-50 hover:bg-gray-100 text-gray-600 font-semibold py-3 rounded-lg border border-gray-200 transition">
                    Return to Homepage
                </a>
            </div>

        </div>
    </main>

</main>

<div id="footer-placeholder"></div>

<script src="./mobileMenu.js"></script>

<script>
    async function loadComponent(placeholderId, filePath) {
        try {
            const response = await fetch(filePath);
            if (response.ok) {
                document.getElementById(placeholderId).innerHTML = await response.text();
            }
        } catch (error) {
            console.error(`Error loading component ${filePath}:`, error);
        }
    }

    // Expire the session cookie immediately — covers both Secure and non-Secure contexts
    document.cookie = 'aura_session=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax; Secure';
    document.cookie = 'aura_session=; Path=/; Expires=Thu, 01 Jan 1970 00:00:00 GMT; SameSite=Lax';

    document.addEventListener("DOMContentLoaded", async () => {
        await loadComponent("nav-placeholder", "./components/nav.html");
        loadComponent("footer-placeholder", "./components/footer.html");

        setupMobileMenu(); // <- Added this!

        const currentPage = window.location.pathname.split("/").pop();
        const titleMap = {
            "index.html": "Welcome",
            "": "Welcome",
            "pricing.html": "Pricing",
            "privacy.html": "Privacy Policy",
            "terms_of_service.html": "Terms of Service",
            "dashboard.html": "Dashboard",
            "billing.html": "Billing",
            "logout.html": "See you Soon"
        };

        const targetTitleSpan = document.getElementById("nav-page-title");
        if (targetTitleSpan && titleMap[currentPage]) {
            targetTitleSpan.innerText = `| ${titleMap[currentPage]}`;
        }
    });
</script>
</body>
</html>
