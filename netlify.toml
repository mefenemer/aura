# Brand transition (US5.2 / AC5.2): permanent 301 from the legacy domain to Be More Swan.
# Effective once both aura-assist.com and bemoreswan.com are attached to the Netlify site
# and DNS (AC5.1, external) points at Netlify.
[[redirects]]
  from = "https://aura-assist.com/*"
  to = "https://bemoreswan.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.aura-assist.com/*"
  to = "https://bemoreswan.com/:splat"
  status = 301
  force = true

# US-HELP-1.1.1 AC14: canonical URL aliases for the help centre
[[redirects]]
  from = "/help"
  to   = "/help.html"
  status = 301

[[redirects]]
  from = "/support"
  to   = "/help.html"
  status = 301

[[redirects]]
  from = "/faq"
  to   = "/help.html"
  status = 301

[build]
  # Rebuild the Tailwind stylesheet from input.css on every deploy so style.css can never
  # drift from the markup (a stale committed style.css silently drops classes and breaks layouts).
  command = "npm run build:css:prod && npm run build:version"
  functions = "netlify/functions"
[dev]
  functions = "netlify/functions"
[functions]
node_bundler = "esbuild"

[[edge_functions]]
  function = "auth-guard"
  path = "/*.html" # Maintenance mode + session guard on all HTML pages

[[edge_functions]]
  function = "auth-guard"
  path = "/"

# US-GAP-7.1.1: In-memory rate limiting for sensitive endpoints
[[edge_functions]]
  function = "rate-limit"
  path = "/.netlify/functions/register"

[[edge_functions]]
  function = "rate-limit"
  path = "/.netlify/functions/login"

[[edge_functions]]
  function = "rate-limit"
  path = "/.netlify/functions/onboarding"

[[edge_functions]]
  function = "rate-limit"
  path = "/.netlify/functions/support-tickets"

# SC3: Daily task-volume threshold check — 08:00 UTC every day
[functions.task-volume-check]
  schedule = "0 8 * * *"

# US-ADM-2.3.1: Stripe↔DB nightly billing reconciliation — 02:00 UTC every day
[functions.reconcile-billing]
  schedule = "0 2 * * *"

# US-SALES-1.1 Part 4: Nightly lead identification — 03:00 UTC every day
[functions.identify-leads]
  schedule = "0 3 * * *"
# US-GOV-2.1.1: Daily digest for stale pending HITL actions — 09:00 UTC every day
[functions.pending-actions-digest]
  schedule = "0 9 * * *"

# US-GOV-3.3.1: Monthly bias statistical sampling — 1st of month at 06:00 UTC
[functions.bias-sampling]
  schedule = "0 6 1 * *"

# US-GOV-3.3.1: Quarterly bias prompt review reminder — 1st Jan/Apr/Jul/Oct at 08:00 UTC
[functions.quarterly-bias-reminder]
  schedule = "0 8 1 1,4,7,10 *"

# US-SMM-2.4.1: Daily draft horizon gap-fill — 06:00 UTC every day
[functions.draft-horizon-fill]
  schedule = "0 6 * * *"

# US-SMM (AC7): Periodic conversion-post scheduler — daily 07:00 UTC; enqueues at most one
# conversion post per eligible assistant per 7 days (see schedule-conversion-posts.ts).
[functions.schedule-conversion-posts]
  schedule = "0 7 * * *"

# Epic 2 US5: Autonomous AI media suggestions — daily 07:00 UTC; drafts copy + AI media into the
# AI review queue for assistants that opted in, within their monthly autonomous credit cap.
[functions.autonomous-media-suggestions]
  schedule = "0 7 * * *"

# Epic 3 US8: AI approvals email digest — daily 08:00 UTC; emails opted-in workspaces a summary of
# pending AI drafts (daily, or weekly on Mondays). Sends nothing when the queue is empty.
[functions.ai-approvals-digest]
  schedule = "0 8 * * *"

# US-SMM-2.4.2: Review urgency check (red-zone alerts + missed post detection) — every 15 minutes
[functions.check-review-urgency]
  schedule = "*/15 * * * *"

# US4 — Offline email fallback for unseen urgent notifications — every 15 minutes
[functions.notification-email-fallback]
  schedule = "*/15 * * * *"

# US-SMM-3.1.1: Process queued content generation jobs — every minute
[functions.process-content-jobs]
  schedule = "* * * * *"
  timeout = 26

# Epic 1, US1: synchronous AI image generation submits to Fal and polls until the images
# are ready. Raise the timeout to Netlify's synchronous max so a slow Flux-2 run completes
# instead of being killed mid-poll (raw 502). The poll budget in fal-gateway stays under this.
[functions.generate-ai-image]
  timeout = 26

# US-SMM-3.2.2: Nightly Meta/Instagram token refresh — 02:00 UTC every day
[functions.refresh-meta-tokens]
  schedule = "0 2 * * *"

# Task 4: Silent X (Twitter) + LinkedIn token refresh — every 30 min (X tokens last ~2h)
[functions.refresh-social-tokens]
  schedule = "*/30 * * * *"

# US-STOR-1.1.2 AC7: Nightly orphaned file cleanup — 03:00 UTC every day
[functions.storage-lifecycle-cleanup]
  schedule = "0 3 * * *"

# Review Queue Archive lifecycle: hard-delete rejected posts past their 30-day window — 04:00 UTC daily
[functions.archive-cleanup]
  schedule = "0 4 * * *"

# US-SMM-3.3.1/3.3.2: Publish due Instagram posts — every minute
[functions.publish-instagram]
  schedule = "* * * * *"

# Publish due LinkedIn & X posts — every minute (non-Instagram social publisher)
[functions.publish-social-posts]
  schedule = "* * * * *"

# Publish due Facebook Page posts — every minute (piggybacks on the Meta connection)
[functions.publish-facebook]
  schedule = "* * * * *"

# Drain inbound webhook events (intake → sandbox → connector handlers) — every minute
[functions.process-webhook-events]
  schedule = "* * * * *"

# US-LEGAL-1.5: 14-day pre-renewal email reminder — 07:00 UTC every day
[functions.renewal-reminder]
  schedule = "0 7 * * *"

# US-ONB-2.1.2: Hourly onboarding reminder emails (24h + 72h after signup, no plan)
[functions.send-onboarding-reminders]
  schedule = "0 * * * *"

# Abandoned assistant-draft cleanup — daily 00:00 UTC. Sends the 23-day re-engagement
# nudge and deletes drafts inactive for 30+ days.
[functions.cleanup-abandoned-drafts]
  schedule = "0 0 * * *"

# US-SMM-PERF: Pull Instagram media insights for recently-published posts — every 6 hours.
# Insights keep changing for days after publish, so we re-fetch a rolling 30-day window.
[functions.ingest-instagram-insights]
  schedule = "0 */6 * * *"

# SMART Goals AC4.1.1: poll current metric values for active goals — hourly. Each goal is
# throttled to its tier cadence (premium hourly, others daily) inside the worker.
[functions.poll-goal-telemetry]
  schedule = "0 * * * *"

# SMART Goals AC4.2.2: collapse the previous day's goal telemetry to one close-of-day point — 00:00 UTC.
[functions.rollup-goal-telemetry]
  schedule = "0 0 * * *"

# SMART Goals US3.3: autonomous optimizer — rewrite allowed brief params for off-track goals — 04:00 UTC daily.
[functions.autonomous-goal-optimizer]
  schedule = "0 4 * * *"
